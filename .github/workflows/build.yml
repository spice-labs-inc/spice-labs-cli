name: Build and Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  OWNER: spice-labs-inc

permissions:
  contents: read
  packages: write

jobs:
  build-deps:
    name: Build and push dependency cache
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push deps cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: deps
          push: true
          tags: ghcr.io/${{ github.repository }}/cache:deps-${{ github.sha }}
          build-args: |
            GH_TOKEN=${{ secrets.GH_TOKEN }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/cache:cache-deps
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository }}/cache:cache-deps,mode=max

  format:
    name: Format and lint
    runs-on: ubuntu-24.04
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run ShellCheck on shell scripts
        run: |
          shellcheck install.sh
          shellcheck test/wrapper/entrypoint.sh
          shellcheck spice

      - name: Run PSScriptAnalyzer on PowerShell scripts
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path ./spice.ps1 -Severity Error -EnableExit
          Invoke-ScriptAnalyzer -Path ./install.ps1 -Severity Error -EnableExit

  test:
    name: Maven test
    needs: build-deps
    runs-on: ubuntu-24.04
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run Tests
        env:
          GH_USERNAME_SG: SpicyGrzl
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          # Build a throwaway intermediate image that COPYs the source in
          # (instead of -v mounting the workspace) so Maven doesn't leave
          # root-owned files on the runner. The deps cache image already has
          # the Maven local repo warm; the settings.xml with GitHub Packages
          # auth is written from env at run time so the private Spice deps
          # (goatrodeo_3, ginger-j, ancho) resolve.
          cat <<'EOF' | docker buildx build --load -t spice-test -f - .
          FROM ghcr.io/${{ github.repository }}/cache:deps-${{ github.sha }}
          WORKDIR /workspace
          COPY . .
          RUN mvn -B -ntp dependency:resolve || true
          ENTRYPOINT ["sh", "-c"]
          EOF
          docker run --rm \
            -e GH_USERNAME_SG \
            -e GH_TOKEN \
            -e MAVEN_CENTRAL_USERNAME \
            -e MAVEN_CENTRAL_PASSWORD \
            spice-test '
              mkdir -p ~/.m2
              cat > ~/.m2/settings.xml <<SXML
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server><id>github-spice-labs-goatrodeo</id><username>'"$GH_USERNAME_SG"'</username><password>'"$GH_TOKEN"'</password></server>
              <server><id>github-spice-labs-ginger</id><username>'"$GH_USERNAME_SG"'</username><password>'"$GH_TOKEN"'</password></server>
              <server><id>github-spice-labs-bom</id><username>'"$GH_USERNAME_SG"'</username><password>'"$GH_TOKEN"'</password></server>
              <server><id>github-spice-labs-plugin-api</id><username>'"$GH_USERNAME_SG"'</username><password>'"$GH_TOKEN"'</password></server>
              <server><id>github</id><username>'"$GH_USERNAME_SG"'</username><password>'"$GH_TOKEN"'</password></server>
              <server><id>central</id><username>'"$MAVEN_CENTRAL_USERNAME"'</username><password>'"$MAVEN_CENTRAL_PASSWORD"'</password></server>
            </servers>
            <profiles>
              <profile>
                <id>ci</id>
                <repositories>
                  <repository><id>github-spice-labs-goatrodeo</id><url>https://maven.pkg.github.com/spice-labs-inc/goatrodeo</url></repository>
                  <repository><id>github-spice-labs-ginger</id><url>https://maven.pkg.github.com/spice-labs-inc/ginger-j</url></repository>
                  <repository><id>github-spice-labs-bom</id><url>https://maven.pkg.github.com/spice-labs-inc/spice-bom</url><snapshots><enabled>true</enabled></snapshots></repository>
                  <repository><id>github-spice-labs-plugin-api</id><url>https://maven.pkg.github.com/spice-labs-inc/spice-plugin-api</url><snapshots><enabled>true</enabled></snapshots></repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles><activeProfile>ci</activeProfile></activeProfiles>
          </settings>
          SXML
              mvn -B -ntp verify
            '

  build-image-spice:
    name: Build and publish spice image
    needs: build-deps
    concurrency:
      group: build-image-${{ github.event.pull_request.number }}-spice
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      artifact-metadata: write
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6

      - name: Publish spice image
        uses: spice-labs-inc/action-publish-image@v2.3
        with:
          image: ghcr.io/${{ github.repository }}
          target: spice
          build-contexts: |
            deps=docker-image://ghcr.io/${{ github.repository }}/cache:deps-${{ github.sha }}
          build-args: |
            GH_TOKEN=${{ secrets.GH_TOKEN }}
          tags: |
            ghcr.io/${{ github.repository }}:pr-${{ github.event.number }}
            ghcr.io/${{ github.repository }}:sha-${{ github.event.pull_request.head.sha }}
          push: true
          git-sha: ${{ github.sha }}
          registry-password: ${{ github.token }}

  build-image-enterprise:
    name: Build and publish enterprise image
    needs: build-image-spice
    # The enterprise image layers the spice wrapper onto the latest released
    # allspice image, so it only needs the spice source (Dockerfile.enterprise
    # + wrapper scripts), not the deps cache.
    concurrency:
      group: build-image-${{ github.event.pull_request.number }}-enterprise
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      artifact-metadata: write
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          # The GITHUB_TOKEN has packages:write for this repo and can read
          # org-scoped internal packages (allspice). The PAT was previously
          # used but lacks write:packages for pushing the enterprise image.
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve allspice base tag
        id: allspice
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          set -euo pipefail
          set -v
          # If a manual override is provided via a repository variable, use it
          # verbatim. Otherwise fall back to the latest semver image tag published
          # to GHCR. PR-number cross-repo pairing is intentionally not supported
          # because PR numbers are not deterministic across repositories.
          ALLSPICE="ghcr.io/${OWNER}/allspice"

          try_candidate() {
            local tag="$1"
            [ -n "${tag}" ] || return 1
            if docker manifest inspect "${ALLSPICE}:${tag}" >/dev/null 2>&1; then
              echo "tag=${tag}" >> "$GITHUB_OUTPUT"
              echo "Using allspice base: ${ALLSPICE}:${tag}"
              exit 0
            fi
            echo "Candidate not found: ${ALLSPICE}:${tag}"
            return 1
          }

          latest_semver=$(gh api "/orgs/${OWNER}/packages/container/allspice/versions" --paginate \
            --jq '[.[] | .metadata.container.tags[] | select(test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort | last' 2>/dev/null)
          echo "latest_semver=${latest_semver}"
          try_candidate "${latest_semver}" || true

          echo "No allspice base image found (tried override, latest semver image)" >&2
          exit 1

      - name: Build and publish enterprise image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.enterprise
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            SPICE_IMAGE=ghcr.io/${{ env.OWNER }}/spice-labs-cli
            SPICE_TAG=pr-${{ github.event.number }}
            ALLSPICE_IMAGE=ghcr.io/${{ env.OWNER }}/allspice
            ALLSPICE_TAG=${{ steps.allspice.outputs.tag }}
          tags: |
            ghcr.io/${{ env.OWNER }}/spice-labs-cli-enterprise:pr-${{ github.event.number }}
            ghcr.io/${{ env.OWNER }}/spice-labs-cli-enterprise:sha-${{ github.event.pull_request.head.sha }}

  build-image-federal:
    name: Build and publish federal image
    needs: build-image-spice
    # The federal image extends the enterprise image with report_cli and the
    # rogues gallery for CBOM generation. Same allspice base as enterprise.
    concurrency:
      group: build-image-${{ github.event.pull_request.number }}-federal
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      artifact-metadata: write
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve allspice base tag
        id: allspice
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          set -euo pipefail
          set -v
          # If a manual override is provided via a repository variable, use it
          # verbatim. Otherwise fall back to the latest semver image tag published
          # to GHCR. PR-number cross-repo pairing is intentionally not supported
          # because PR numbers are not deterministic across repositories.
          ALLSPICE="ghcr.io/${OWNER}/allspice"

          try_candidate() {
            local tag="$1"
            [ -n "${tag}" ] || return 1
            echo "Trying allspice base candidate: ${ALLSPICE}:${tag}"
            if docker manifest inspect "${ALLSPICE}:${tag}" >/dev/null 2>&1; then
              echo "tag=${tag}" >> "$GITHUB_OUTPUT"
              echo "Using allspice base: ${ALLSPICE}:${tag}"
              exit 0
            fi
            echo "Candidate not found: ${ALLSPICE}:${tag}"
            return 1
          }

          latest_semver=$(gh api "/orgs/${OWNER}/packages/container/allspice/versions" --paginate \
            --jq '[.[] | .metadata.container.tags[] | select(test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort | last' 2>/dev/null)
          echo "latest_semver=${latest_semver}"
          try_candidate "${latest_semver}" || true

          echo "No allspice base image found" >&2
          exit 1

      - name: Build and publish federal image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.federal
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            SPICE_IMAGE=ghcr.io/${{ env.OWNER }}/spice-labs-cli
            SPICE_TAG=pr-${{ github.event.number }}
            ALLSPICE_IMAGE=ghcr.io/${{ env.OWNER }}/allspice
            ALLSPICE_TAG=${{ steps.allspice.outputs.tag }}
          tags: |
            ghcr.io/${{ env.OWNER }}/spice-labs-cli-federal:pr-${{ github.event.number }}
            ghcr.io/${{ env.OWNER }}/spice-labs-cli-federal:sha-${{ github.event.pull_request.head.sha }}

  export-otel:
    name: Export OpenTelemetry traces
    needs:
      - build-deps
      - format
      - test
      - build-image-spice
      - build-image-enterprise
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
      pull-requests: read
      checks: read
    steps:
      - name: Export workflow traces to Honeycomb
        uses: dash0hq/otel-cicd-action@v4
        with:
          otlpEndpoint: "grpc://api.eu1.honeycomb.io:443/"
          otlpHeaders: "x-honeycomb-team=${{ secrets.HONEYCOMB_API_KEY }},x-honeycomb-dataset=build"
          githubToken: "${{ secrets.GITHUB_TOKEN }}"

# Requirements for builder machine
# docker jq curl gh shellcheck powershell
