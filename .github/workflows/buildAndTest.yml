name: Build and Test

on:
  push:
    branches: ["**"]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 21 and GitHub Maven auth
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
          server-id: github
          server-username: ${{ secrets.GH_USERNAME_SG }}
          server-password: ${{ secrets.GH_TOKEN }}

      - name: Write settings.xml for GitHub + Maven Central
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">

            <servers>
              <server>
                <id>github-spice-labs-goatrodeo</id>
                <username>${{ secrets.GH_USERNAME_SG }}</username>
                <password>${{ secrets.GH_TOKEN }}</password>
              </server>
              <server>
                <id>github-spice-labs-ginger</id>
                <username>${{ secrets.GH_USERNAME_SG }}</username>
                <password>${{ secrets.GH_TOKEN }}</password>
              </server>
              <server>
                <id>github</id>
                <username>${{ secrets.GH_USERNAME_SG }}</username>
                <password>${{ secrets.GH_TOKEN }}</password>
              </server>
              <server>
                <id>central</id>
                <username>${{ secrets.MAVEN_CENTRAL_USERNAME }}</username>
                <password>${{ secrets.MAVEN_CENTRAL_PASSWORD }}</password>
              </server>
            </servers>

            <profiles>
              <profile>
                <id>github</id>
                <repositories>
                  <repository>
                    <id>github-spice-labs-goatrodeo</id>
                    <url>https://maven.pkg.github.com/spice-labs-inc/goatrodeo</url>
                  </repository>
                  <repository>
                    <id>github-spice-labs-ginger</id>
                    <url>https://maven.pkg.github.com/spice-labs-inc/ginger-j</url>
                  </repository>
                </repositories>
              </profile>

              <profile>
                <id>maven-central</id>
                <repositories>
                  <repository>
                    <id>github-spice-labs-goatrodeo</id>
                    <url>https://maven.pkg.github.com/spice-labs-inc/goatrodeo</url>
                  </repository>
                  <repository>
                    <id>github-spice-labs-ginger</id>
                    <url>https://maven.pkg.github.com/spice-labs-inc/ginger-j</url>
                  </repository>
                </repositories>
              </profile>

              <profile>
                <id>default-repos</id>
                <repositories>
                  <repository>
                    <id>github-spice-labs-goatrodeo</id>
                    <url>https://maven.pkg.github.com/spice-labs-inc/goatrodeo</url>
                  </repository>
                  <repository>
                    <id>github-spice-labs-ginger</id>
                    <url>https://maven.pkg.github.com/spice-labs-inc/ginger-j</url>
                  </repository>
                </repositories>
              </profile>
            </profiles>

          </settings>
          EOF


      # spice-labs-cli depends on io.spicelabs:spice-runtime (and, transitively,
      # spice-plugin-api), defined in the qahwa peer. Build and install them first so
      # the CLI build resolves them locally — they aren't published at this version.
      - name: Checkout qahwa peer
        uses: actions/checkout@v6
        with:
          repository: spice-labs-inc/qahwa
          path: qahwa
          token: ${{ secrets.GH_TOKEN }}

      - name: Install qahwa artifacts (spice-plugin-api + spice-runtime)
        run: |
          mvn --batch-mode -f qahwa/api/pom.xml -DskipTests install
          mvn --batch-mode -f qahwa/spice-runtime/pom.xml -DskipTests install

      - name: Install Dependencies and Build
        run: mvn --batch-mode --update-snapshots -DskipTests -Pdefault-repos install

      - name: Test with Maven
        run: mvn --batch-mode --update-snapshots -Pdefault-repos verify

      - name: Run ShellCheck on shell scripts
        run: |
          shellcheck install.sh
          shellcheck test/wrapper/entrypoint.sh
          shellcheck spice

      - name: Run PSScriptAnalyzer on PowerShell scripts
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path ./spice.ps1 -Severity Error -EnableExit
          Invoke-ScriptAnalyzer -Path ./install.ps1 -Severity Error -EnableExit
