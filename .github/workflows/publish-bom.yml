name: Publish the Spice Labs BOM

# The BOM (bom/pom.xml, io.spicelabs:spice-bom) is a standalone artifact that versions and
# releases independently of the CLI *and* of spice-plugin-api. It ships on its own tag,
# `bom-v<x.y.z>` (see RELEASING.md for the version-bump rules). The BOM references a
# released spice-plugin-api (published separately by publish-plugin-api.yml), so that
# plugin-api release must precede the BOM release.
on:
  push:
    tags:
      - "bom-v*"

jobs:
  publish_bom:
    name: Publish spice-bom to GitHub Packages and Maven Central
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate and extract version from tag
        id: validate
        run: |
          if [[ "${GITHUB_REF}" =~ ^refs/tags/bom-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "Tag does not match BOM version pattern bom-v*.*.*" >&2
            exit 1
          fi

      - name: Set up JDK 21 and GitHub Maven auth
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
          server-id: github
          server-username: ${{ secrets.GH_USERNAME_SG }}
          server-password: ${{ secrets.GH_TOKEN }}
          token: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          gpg-private-key: ${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}

      - name: Write settings.xml for GitHub + Maven Central
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">

            <servers>
              <server>
                <id>github</id>
                <username>${{ secrets.GH_USERNAME_SG }}</username>
                <password>${{ secrets.GH_TOKEN }}</password>
              </server>
              <server>
                <id>central</id>
                <username>${{ secrets.MAVEN_CENTRAL_USERNAME }}</username>
                <password>${{ secrets.MAVEN_CENTRAL_PASSWORD }}</password>
              </server>
            </servers>

          </settings>
          EOF

      - name: Import GPG key
        run: |
          echo "${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Resolve and verify the released plugin-api version
        # The released BOM must reference a released spice-plugin-api, not a SNAPSHOT. Take
        # the BOM's managed version, strip -SNAPSHOT, and confirm it is already published
        # (release plugin-api first: tag plugin-api-v<x.y.z>).
        run: |
          PLUGIN_API_SNAP="$(mvn --batch-mode -f bom/pom.xml help:evaluate -Dexpression=spice-plugin-api.version -q -DforceStdout)"
          PLUGIN_API_VERSION="${PLUGIN_API_SNAP%-SNAPSHOT}"
          echo "PLUGIN_API_VERSION=${PLUGIN_API_VERSION}" >> "$GITHUB_ENV"
          mvn --batch-mode dependency:get "-Dartifact=io.spicelabs:spice-plugin-api:${PLUGIN_API_VERSION}:pom"

      - name: Set BOM version from tag and pin plugin-api to its release
        run: |
          mvn --batch-mode -f bom/pom.xml versions:set -DnewVersion=${{ steps.validate.outputs.VERSION }} -DgenerateBackupPoms=false
          mvn --batch-mode -f bom/pom.xml versions:set-property -Dproperty=spice-plugin-api.version "-DnewVersion=${PLUGIN_API_VERSION}" -DgenerateBackupPoms=false

      - name: Publish BOM to GitHub Packages
        run: mvn --batch-mode -f bom/pom.xml clean deploy -P github
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}

      - name: Publish BOM to Maven Central
        run: mvn --batch-mode -f bom/pom.xml clean deploy -P maven-central
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}
