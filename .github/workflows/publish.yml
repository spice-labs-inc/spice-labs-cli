name: Publish The Spice Labs Surveyor CLI Container Images

# Publishing IS the release. A GitHub Release (vX.Y.Z tag, published) triggers
# the full build graph: JARs -> Maven Central + GHP, OSS image -> Docker Hub +
# GHCR, then enterprise + federal images (retagged from the sha-<sha> images
# produced by the merged PR, or built from source as a fallback). survey.yml
# runs after this workflow via workflow_run (by name) to survey the published
# artifacts, so the workflow name above must not change without updating that
# trigger.
on:
  release:
    types: [published]

env:
  OWNER: spice-labs-inc
  PLATFORMS: linux/amd64,linux/arm64
  PUBLIC_DOCKER_IMAGE: spicelabs/spice-labs-cli
  ENTERPRISE_IMAGE: ghcr.io/spice-labs-inc/spice-labs-cli-enterprise
  FEDERAL_IMAGE: ghcr.io/spice-labs-inc/spice-labs-cli-federal
  ALLSPICE_IMAGE: ghcr.io/spice-labs-inc/allspice

jobs:
  publish_jars:
    name: Publish CLI JARs to GitHub Packages and Maven Central
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      id-token: write
    outputs:
      version: ${{ steps.validate.outputs.VERSION }}
      thread-ts: ${{ steps.release-notification.outputs.thread-ts }}
      channel-id: ${{ steps.release-notification.outputs.channel-id }}
    steps:
      - name: Notify release
        id: release-notification
        uses: spice-labs-inc/action-release-notification@v3.3
        with:
          type: release
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          username-mapping: ${{ vars.GH_SLACK_USERNAME_MAPPING }}
          github-token: ${{ github.token }}

      - name: Checkout with LFS
        uses: actions/checkout@v6
        with:
          lfs: true
          ref: ${{ github.event.release.tag_name }}

      - name: Validate and extract version from tag
        id: validate
        env:
          # tag_name is "vX.Y.Z" (no refs/tags/ prefix) for the release event.
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [[ "${TAG_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Tag does not match semantic version pattern v*.*.* (got: ${TAG_NAME})" >&2
            exit 1
          fi

      - name: Set up JDK 21 and GitHub Maven auth
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
          server-id: github
          server-username: SpicyGrzl
          server-password: ${{ secrets.GH_TOKEN }}
          token: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          gpg-private-key: ${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}

      - name: Write settings.xml for GitHub + Maven Central
        uses: ./.github/actions/maven-settings
        with:
          github-username: SpicyGrzl
          github-token: ${{ secrets.GH_TOKEN }}
          central-username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          central-password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          active-profile: github

      - name: Update version in pom.xml using Maven plugin
        run: mvn --batch-mode versions:set -DnewVersion=${{ steps.validate.outputs.VERSION }} -DgenerateBackupPoms=false

      - name: Build and publish all jars to GitHub Packages
        id: build-jars-github
        run: mvn --batch-mode clean deploy -P github
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME_SG }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}

      - name: Build and publish all jars to Maven Central
        id: build-jars-maven-central
        run: mvn --batch-mode clean deploy -P maven-central
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME_SG }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}

      - name: Upload wrapper scripts and completions to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            spice
            spice.ps1
            install.sh
            install.ps1

  docker_image:
    name: Build and Push Docker Image (Docker Hub + GHCR)
    runs-on: ubuntu-24.04
    needs: publish_jars
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Write settings.xml for GitHub Packages
        uses: ./.github/actions/maven-settings
        with:
          github-username: SpicyGrzl
          github-token: ${{ secrets.GH_TOKEN }}
          central-username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          central-password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          active-profile: github

      - name: Download released fat jar and ancho agent
        # The release image must ship the released fat JAR (version-stamped by
        # publish_jars), not the SNAPSHOT inside the PR image. Download both
        # into target/ so Dockerfile.retag can COPY them over the base.
        run: |
          mkdir -p target
          curl -fL -o target/spice-labs-cli-${{ needs.publish_jars.outputs.version }}-fat.jar \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://maven.pkg.github.com/spice-labs-inc/spice-labs-cli/io/spicelabs/spice-labs-cli/${{ needs.publish_jars.outputs.version }}/spice-labs-cli-${{ needs.publish_jars.outputs.version }}-fat.jar"
          ANCHO_VERSION=$(mvn help:evaluate -Dexpression=ancho.version -q -DforceStdout)
          mvn --batch-mode dependency:copy \
            -Dartifact=io.spicelabs:ancho:${ANCHO_VERSION}:jar:fat \
            -DoutputDirectory=target \
            -Dmdep.stripVersion=true \
            -Dmdep.stripClassifier=true \
            -Dmdep.overWriteIfNewer=true
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME_SG }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Check if release is a pre-release
        id: prerelease
        run: |
          IS_PRERELEASE=$(gh release view ${{ github.ref_name }} --json isPrerelease -q '.isPrerelease')
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve PR-head image tag
        # The release tag points at a merge commit (GitHub merge strategy).
        # build.yml tags images sha-<PR-head-sha>, so walk the merge commit's
        # parents to find the PR head (2nd parent), falling back to the
        # release SHA itself for squash/rebase merges (single-parent).
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          parents=$(gh api "repos/${OWNER}/spice-labs-cli/commits/${RELEASE_SHA}" --jq '.parents[].sha')
          count=$(echo "$parents" | wc -w)
          if [ "$count" -ge 2 ]; then
            PR_HEAD=$(echo "$parents" | sed -n '2p')
          else
            PR_HEAD="${RELEASE_SHA}"
          fi
          echo "pr-head=${PR_HEAD}" >> "$GITHUB_OUTPUT"
          echo "Release SHA: ${RELEASE_SHA} (PR head: ${PR_HEAD})"

      - name: Extract metadata (tags, labels) for Docker Hub + GHCR
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.PUBLIC_DOCKER_IMAGE }}
            ghcr.io/${{ env.OWNER }}/spice-labs-cli
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}

      - name: Retag PR image with released JARs (Docker Hub + GHCR)
        # Layer the released fat JAR + ancho onto the PR image (FROM sha-<PR-head>)
        # via Dockerfile.retag, stamping version labels. Pushes to both
        # registries in a single multi-arch build. Falls back to a full source
        # build if the sha-<PR-head> image doesn't exist.
        id: push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERSION: ${{ needs.publish_jars.outputs.version }}
          RELEASE_SHA: ${{ github.sha }}
          BUILD_DATE: ${{ steps.prerelease.outputs.build-date }}
          PR_HEAD: ${{ steps.resolve.outputs.pr-head }}
        run: |
          set -euo pipefail
          # Build the --tag args from the newline-separated metadata output.
          tag_args=()
          while IFS= read -r t; do
            [ -n "$t" ] && tag_args+=(--tag "$t")
          done <<< "${{ steps.meta.outputs.tags }}"
          base="ghcr.io/${OWNER}/spice-labs-cli:sha-${PR_HEAD}"
          if docker manifest inspect "${base}" >/dev/null 2>&1; then
            echo "Retagging ${base} with released JARs"
            docker buildx build \
              --file Dockerfile.retag \
              --build-arg BASE_IMAGE="${base}" \
              --build-arg VERSION="${VERSION}" \
              --build-arg REVISION="${RELEASE_SHA}" \
              --build-arg BUILD_DATE="${BUILD_DATE}" \
              "${tag_args[@]}" \
              --push \
              .
          else
            echo "No ${base} found; building from source"
            docker buildx build \
              --platform "${PLATFORMS}" \
              --build-arg GH_TOKEN="${GH_TOKEN}" \
              "${tag_args[@]}" \
              --push \
              .
          fi

  build_enterprise:
    name: Retag (or build) Enterprise Image
    runs-on: ubuntu-24.04
    needs: [publish_jars, docker_image]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Write settings.xml for GitHub Packages
        uses: ./.github/actions/maven-settings
        with:
          github-username: SpicyGrzl
          github-token: ${{ secrets.GH_TOKEN }}
          central-username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          central-password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          active-profile: github

      - name: Download released fat jar and ancho agent
        run: |
          mkdir -p target
          curl -fL -o target/spice-labs-cli-${{ needs.publish_jars.outputs.version }}-fat.jar \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://maven.pkg.github.com/spice-labs-inc/spice-labs-cli/io/spicelabs/spice-labs-cli/${{ needs.publish_jars.outputs.version }}/spice-labs-cli-${{ needs.publish_jars.outputs.version }}-fat.jar"
          ANCHO_VERSION=$(mvn help:evaluate -Dexpression=ancho.version -q -DforceStdout)
          mvn --batch-mode dependency:copy \
            -Dartifact=io.spicelabs:ancho:${ANCHO_VERSION}:jar:fat \
            -DoutputDirectory=target \
            -Dmdep.stripVersion=true \
            -Dmdep.stripClassifier=true \
            -Dmdep.overWriteIfNewer=true
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME_SG }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Retag enterprise image sha-<sha> -> vX.Y.Z
        id: retag
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          VERSION: ${{ needs.publish_jars.outputs.version }}
        run: |
          set -euo pipefail
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          image="${ENTERPRISE_IMAGE}"

          # The release tag points at a merge commit; build.yml tags images
          # sha-<PR-head-sha>. Walk the merge commit's parents to find the
          # PR head (2nd parent), falling back to the commit itself for
          # squash/rebase merges.
          parents=$(gh api "repos/${OWNER}/spice-labs-cli/commits/${RELEASE_SHA}" --jq '.parents[].sha')
          count=$(echo "$parents" | wc -w)
          if [ "$count" -ge 2 ]; then
            PR_HEAD=$(echo "$parents" | sed -n '2p')
          else
            PR_HEAD="${RELEASE_SHA}"
          fi
          echo "Release SHA: ${RELEASE_SHA} (PR head: ${PR_HEAD})"
          cur="sha-${PR_HEAD}"

          # Build the release image FROM the sha-<sha> enterprise image
          # (produced by the merged PR), stamping the version as OCI labels +
          # SPICE_VERSION env via Dockerfile.retag. Not a pure manifest retag —
          # the release image is a distinct layer carrying version metadata.
          # Fall through to a source build only if no sha-<sha> exists.
          if docker manifest inspect "${image}:${cur}" >/dev/null 2>&1; then
            docker buildx build \
              --file Dockerfile.retag \
              --build-arg BASE_IMAGE="${image}:${cur}" \
              --build-arg VERSION="${VERSION}" \
              --build-arg REVISION="${RELEASE_SHA}" \
              --build-arg BUILD_DATE="${BUILD_DATE}" \
              --tag "${image}:${RELEASE_TAG}" \
              --tag "${image}:latest" \
              --push \
              .
            echo "built=false" >> "$GITHUB_OUTPUT"
            echo "Built ${image}:${RELEASE_TAG} FROM ${image}:${cur} (version ${VERSION})"
          else
            echo "No ${image}:${cur} found; will build ${RELEASE_TAG} from source" >&2
            echo "built=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve latest allspice image tag
        if: steps.retag.outputs.built == 'true'
        id: allspice
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Resolve the latest allspice tag from the actual image tags published
          # to GHCR, falling back to the last known published image if no semver
          # tag exists yet.
          ALLSPICE="ghcr.io/${OWNER}/allspice"

          try_candidate() {
            local tag="$1"
            [ -n "${tag}" ] || return 1
            if docker manifest inspect "${ALLSPICE}:${tag}" >/dev/null 2>&1; then
              echo "allspice_tag=${tag}" >> "$GITHUB_OUTPUT"
              echo "Using allspice image tag: ${tag}"
              exit 0
            fi
            return 1
          }

          latest_semver=$(gh api "/orgs/${OWNER}/packages/container/allspice/versions" --paginate \
            --jq '[.[] | .metadata.container.tags[] | select(test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort | last' 2>/dev/null)
          echo "latest_semver=${latest_semver}"
          try_candidate "${latest_semver}"

          echo "No allspice base image found (tried latest semver image)" >&2
          exit 1

      - name: Build and push enterprise image (fallback)
        if: steps.retag.outputs.built == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.enterprise
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            SPICE_IMAGE=ghcr.io/${{ env.OWNER }}/spice-labs-cli
            SPICE_TAG=${{ github.event.release.tag_name }}
            ALLSPICE_IMAGE=${{ env.ALLSPICE_IMAGE }}
            ALLSPICE_TAG=${{ steps.allspice.outputs.allspice_tag }}
          tags: |
            ${{ env.ENTERPRISE_IMAGE }}:${{ github.event.release.tag_name }}
            ${{ env.ENTERPRISE_IMAGE }}:latest

  build_federal:
    name: Retag (or build) Federal Image
    runs-on: ubuntu-24.04
    needs: [publish_jars, docker_image]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Write settings.xml for GitHub Packages
        uses: ./.github/actions/maven-settings
        with:
          github-username: SpicyGrzl
          github-token: ${{ secrets.GH_TOKEN }}
          central-username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          central-password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          active-profile: github

      - name: Download released fat jar and ancho agent
        run: |
          mkdir -p target
          curl -fL -o target/spice-labs-cli-${{ needs.publish_jars.outputs.version }}-fat.jar \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://maven.pkg.github.com/spice-labs-inc/spice-labs-cli/io/spicelabs/spice-labs-cli/${{ needs.publish_jars.outputs.version }}/spice-labs-cli-${{ needs.publish_jars.outputs.version }}-fat.jar"
          ANCHO_VERSION=$(mvn help:evaluate -Dexpression=ancho.version -q -DforceStdout)
          mvn --batch-mode dependency:copy \
            -Dartifact=io.spicelabs:ancho:${ANCHO_VERSION}:jar:fat \
            -DoutputDirectory=target \
            -Dmdep.stripVersion=true \
            -Dmdep.stripClassifier=true \
            -Dmdep.overWriteIfNewer=true
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME_SG }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Retag federal image sha-<sha> -> vX.Y.Z
        id: retag
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          VERSION: ${{ needs.publish_jars.outputs.version }}
        run: |
          set -euo pipefail
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          image="${FEDERAL_IMAGE}"

          # The release tag points at a merge commit; build.yml tags images
          # sha-<PR-head-sha>. Walk the merge commit's parents to find the
          # PR head (2nd parent), falling back to the commit itself for
          # squash/rebase merges.
          parents=$(gh api "repos/${OWNER}/spice-labs-cli/commits/${RELEASE_SHA}" --jq '.parents[].sha')
          count=$(echo "$parents" | wc -w)
          if [ "$count" -ge 2 ]; then
            PR_HEAD=$(echo "$parents" | sed -n '2p')
          else
            PR_HEAD="${RELEASE_SHA}"
          fi
          echo "Release SHA: ${RELEASE_SHA} (PR head: ${PR_HEAD})"
          cur="sha-${PR_HEAD}"

          if docker manifest inspect "${image}:${cur}" >/dev/null 2>&1; then
            docker buildx build \
              --file Dockerfile.retag \
              --build-arg BASE_IMAGE="${image}:${cur}" \
              --build-arg VERSION="${VERSION}" \
              --build-arg REVISION="${RELEASE_SHA}" \
              --build-arg BUILD_DATE="${BUILD_DATE}" \
              --tag "${image}:${RELEASE_TAG}" \
              --tag "${image}:latest" \
              --push \
              .
            echo "built=false" >> "$GITHUB_OUTPUT"
            echo "Built ${image}:${RELEASE_TAG} FROM ${image}:${cur} (version ${VERSION})"
          else
            echo "No ${image}:${cur} found; will build ${RELEASE_TAG} from source" >&2
            echo "built=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve latest allspice image tag
        if: steps.retag.outputs.built == 'true'
        id: allspice
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Resolve the latest allspice tag from the actual image tags published
          # to GHCR, falling back to the last known published image if no semver
          # tag exists yet.
          ALLSPICE="ghcr.io/${OWNER}/allspice"

          try_candidate() {
            local tag="$1"
            [ -n "${tag}" ] || return 1
            if docker manifest inspect "${ALLSPICE}:${tag}" >/dev/null 2>&1; then
              echo "allspice_tag=${tag}" >> "$GITHUB_OUTPUT"
              echo "Using allspice image tag: ${tag}"
              exit 0
            fi
            return 1
          }

          latest_semver=$(gh api "/orgs/${OWNER}/packages/container/allspice/versions" --paginate \
            --jq '[.[] | .metadata.container.tags[] | select(test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort | last' 2>/dev/null)
          echo "latest_semver=${latest_semver}"
          try_candidate "${latest_semver}"

          echo "No allspice base image found (tried latest semver image)" >&2
          exit 1

      - name: Build and push federal image (fallback)
        if: steps.retag.outputs.built == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.federal
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            SPICE_IMAGE=ghcr.io/${{ env.OWNER }}/spice-labs-cli
            SPICE_TAG=${{ github.event.release.tag_name }}
            ALLSPICE_IMAGE=${{ env.ALLSPICE_IMAGE }}
            ALLSPICE_TAG=${{ steps.allspice.outputs.allspice_tag }}
          tags: |
            ${{ env.FEDERAL_IMAGE }}:${{ github.event.release.tag_name }}
            ${{ env.FEDERAL_IMAGE }}:latest

  notify:
    name: Notify deployment result
    needs: [publish_jars, docker_image, build_enterprise, build_federal]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Check deployment status
        id: deployment-status
        shell: bash
        run: |
          JAR_STATUS="${{ needs.publish_jars.result }}"
          DOCKER_STATUS="${{ needs.docker_image.result }}"
          ENT_STATUS="${{ needs.build_enterprise.result }}"

          if [ "$JAR_STATUS" == "success" ] && [ "$DOCKER_STATUS" == "success" ] && [ "$ENT_STATUS" == "success" ]; then
            echo "overall_status=success" >> "$GITHUB_OUTPUT"
            echo "message=✅ All components deployed successfully!" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=failure" >> "$GITHUB_OUTPUT"
            MESSAGE="❌ Deployment failed:"
            [ "$JAR_STATUS" != "success" ] && MESSAGE="$MESSAGE ❌ JAR publishing failed." || MESSAGE="$MESSAGE ✅ JAR publishing succeeded."
            [ "$DOCKER_STATUS" != "success" ] && MESSAGE="$MESSAGE ❌ Docker build/push failed." || MESSAGE="$MESSAGE ✅ Docker build/push succeeded."
            [ "$ENT_STATUS" != "success" ] && MESSAGE="$MESSAGE ❌ Enterprise image build failed." || MESSAGE="$MESSAGE ✅ Enterprise image build succeeded."
            echo "message=$MESSAGE" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify deployment result
        uses: spice-labs-inc/action-release-notification@v3.3
        with:
          type: ${{ steps.deployment-status.outputs.overall_status == 'success' && 'deployment-success' || 'deployment-failure' }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          username-mapping: ${{ vars.GH_SLACK_USERNAME_MAPPING }}
          github-token: ${{ github.token }}
          environment: production
          thread-ts: ${{ needs.publish_jars.outputs.thread-ts }}
          channel-id: ${{ needs.publish_jars.outputs.channel-id }}

  export-otel:
    name: Export OpenTelemetry traces
    needs:
      - publish_jars
      - docker_image
      - build_enterprise
      - notify
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
      pull-requests: read
      checks: read
    steps:
      - name: Export workflow traces to Honeycomb
        uses: dash0hq/otel-cicd-action@v4
        with:
          otlpEndpoint: "grpc://api.eu1.honeycomb.io:443/"
          otlpHeaders: "x-honeycomb-team=${{ secrets.HONEYCOMB_API_KEY }},x-honeycomb-dataset=build"
          githubToken: "${{ secrets.GITHUB_TOKEN }}"
