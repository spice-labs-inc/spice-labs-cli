name: Deploy

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - junkyard
          - prod
          - dev
          - astewart

env:
  OWNER: spice-labs-inc

jobs:
  resolve:
    name: Resolve images
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      environment: ${{ steps.meta.outputs.environment }}
      sha: ${{ steps.meta.outputs.sha }}
      images: ${{ steps.resolve.outputs.images }}
      images_keys: ${{ steps.resolve.outputs.images_keys }}
    steps:
      - name: Determine deploy tag and environment
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          set -euo pipefail
          # Uniform tag to deploy for every image that was built:
          #   merged PR / dispatch on main -> sha-<github.sha>
          #   dispatch on a feature branch  -> pr-<N> (from the open PR)
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            environment="${INPUT_ENVIRONMENT}"
            branch="${GITHUB_REF#refs/heads/}"
            if [ "${branch}" = "main" ]; then
              tag="sha-${GITHUB_SHA}"
            else
              pr=$(gh api "/repos/${GITHUB_REPOSITORY}/pulls?state=open&head=${OWNER}:${branch}&per_page=1" \
                   --jq '.[0].number // empty')
              [ -n "${pr}" ] || { echo "No open PR found for branch: ${branch}" >&2; exit 1; }
              tag="pr-${pr}"
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ "${PR_MERGED}" = "true" ]; then
            environment="staging"
            tag="sha-${GITHUB_SHA}"       # merge commit
          else
            echo "Unsupported event: ${GITHUB_EVENT_NAME}" >&2
            exit 1
          fi
          {
            echo "environment=${environment}"
            echo "tag=${tag}"
            echo "sha=${GITHUB_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          # PAT (not the repo-scoped GITHUB_TOKEN) so the runner can inspect
          # and retag the private org-scoped enterprise image.
          username: ${{ secrets.GH_USERNAME_SG }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Resolve image refs
        id: resolve
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_SHA: ${{ github.sha }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          declare -A IMG=(
            [spice]="ghcr.io/${OWNER}/spice-labs-cli"
            [enterprise]="ghcr.io/${OWNER}/spice-labs-cli-enterprise"
          )

          # Merged PR: retag pr-<N> -> sha-<merge sha> for every image that has it.
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            for key in spice enterprise; do
              image="${IMG[$key]}"
              if docker manifest inspect "${image}:pr-${PR_NUMBER}" >/dev/null 2>&1; then
                docker buildx imagetools create "${image}:pr-${PR_NUMBER}" \
                  --tag "${image}:sha-${GITHUB_SHA}"
              fi
            done
          fi

          # Deploy only the images built at the chosen tag (the ones changed by
          # this PR / merge). Others keep their current deployed version.
          map='{}'
          for key in spice enterprise; do
            image="${IMG[$key]}"
            docker manifest inspect "${image}:${TAG}" >/dev/null 2>&1 || continue
            digest=$(docker buildx imagetools inspect "${image}:${TAG}" --format '{{json .Manifest.Digest}}' | tr -d '"')
            map=$(jq --arg k "$key" --arg t "$TAG" --arg d "$digest" --arg r "${image}:${TAG}@${digest}" \
              '.[$k] = {tag:$t, digest:$d, ref:$r}' <<< "$map")
          done

          # `map` is multi-line JSON; use the heredoc file-command form so the
          # whole object becomes one `images` output value instead of one
          # broken entry per line.
          {
            echo "images<<EOF"
            echo "${map}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "images_keys=$(jq -c 'keys' <<< "$map")" >> "$GITHUB_OUTPUT"

  release:
    name: Deploy and notify
    needs: resolve
    if: needs.resolve.result == 'success' && !cancelled()
    runs-on: ubuntu-24.04
    # Reference the environment so GitHub records a native Deployment
    # (Deployments tab + per-commit deployment statuses) for this publish.
    environment: ${{ needs.resolve.outputs.environment }}
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
      deployments: write
    steps:
      - name: Build deployment patch
        id: patch
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SHA: ${{ needs.resolve.outputs.sha }}
          IMAGES: ${{ needs.resolve.outputs.images }}
        run: |
          set -euo pipefail
          version=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name // empty' 2>/dev/null || true)
          yq=""
          for key in $(jq -r 'keys[]' <<< "$IMAGES"); do
            ref=$(jq -r --arg k "$key" '.[$k].ref' <<< "$IMAGES")
            yq="${yq:+${yq} | }.data[\"values.${key}_image\"] = \"${ref}\""
          done
          target=$(jq -r '.spice.ref // empty' <<< "$IMAGES")
          if [ -n "$target" ]; then
            yq="${yq:+${yq} | }.data.target_image = \"${target}\""
          fi
          {
            echo "version=${version}"
            echo "yq<<EOF"
            echo "$yq"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Release to ${{ needs.resolve.outputs.environment }}
        uses: spice-labs-inc/action-release-immediately@v3.1
        with:
          name: "spice-labs-cli"
          version: "${{ steps.patch.outputs.version }}"
          environment: "${{ needs.resolve.outputs.environment }}"
          token: "${{ secrets.GH_TOKEN }}"
          yq: ${{ steps.patch.outputs.yq }}

      - name: Notify Slack of ${{ needs.resolve.outputs.environment }} deployment
        uses: spice-labs-inc/action-release-notification@v3.3
        with:
          type: staging
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          username-mapping: ${{ vars.GH_SLACK_USERNAME_MAPPING }}
          github-token: ${{ github.token }}
          environment: ${{ needs.resolve.outputs.environment }}

  extract-adg:
    name: Upload ADG — ${{ matrix.key }}
    needs: resolve
    # An empty matrix vector (e.g. a merged PR that built no images, where
    # resolve emits images_keys=[]) is a hard error evaluated before this
    # `if`. Guard on a non-empty matrix so the job is skipped instead of
    # erroring the run. fromJSON()[0] != null is robust to `[]`/`[ ]`
    # formatting differences.
    if: always() && needs.resolve.result == 'success' && !cancelled() && fromJSON(needs.resolve.outputs.images_keys)[0] != null
    runs-on: ubuntu-24.04
    permissions:
      packages: read
    strategy:
      matrix:
        key: ${{ fromJson(needs.resolve.outputs.images_keys) }}
      fail-fast: false
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          # PAT: the enterprise image is a private org-scoped package.
          username: ${{ secrets.GH_USERNAME_SG }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Export image
        env:
          IMAGES: ${{ needs.resolve.outputs.images }}
        run: |
          mkdir -p target/adg
          ref=$(jq -r --arg k "${{ matrix.key }}" '.[$k].ref' <<< "$IMAGES")
          docker manifest inspect "$ref" >/dev/null
          docker pull "$ref"
          docker save "$ref" -o "target/adg/${{ matrix.key }}.tar"

      - name: Index and Upload ADG
        uses: spice-labs-inc/action-spice-labs-surveyor@v5
        with:
          spice_pass: ${{ secrets.SPICE_PASS }}
          input: ./
          subject: ${{ matrix.key }}

  export-otel:
    name: Export OpenTelemetry traces
    needs:
      - resolve
      - release
      - extract-adg
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
      pull-requests: read
      checks: read
    steps:
      - name: Export workflow traces to Honeycomb
        uses: dash0hq/otel-cicd-action@v4
        with:
          otlpEndpoint: "grpc://api.eu1.honeycomb.io:443/"
          otlpHeaders: "x-honeycomb-team=${{ secrets.HONEYCOMB_API_KEY }},x-honeycomb-dataset=build"
          githubToken: "${{ secrets.GITHUB_TOKEN }}"
